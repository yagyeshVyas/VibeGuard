# VibeGuard CircleCI template
# Generated by 'vibeguard init-ci --circleci' — add this to .circleci/config.yml

version: 2.1
jobs:
  vibeguard:
    docker:
      - image: cimg/node:22.0
    steps:
      - checkout
      - run: npm ci
      - run:
          name: VibeGuard Security Scan
          command: |
            npx -y vibeguard scan . --sarif > vibeguard-report.sarif || true
            npx -y vibeguard scan . --fail-on high
      - store_artifacts:
          path: vibeguard-report.sarif

workflows:
  version: 2
  security:
    jobs:
      - vibeguard
