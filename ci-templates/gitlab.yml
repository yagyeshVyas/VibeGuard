# VibeGuard GitLab CI template
# Generated by 'vibeguard init-ci --gitlab' — add this to .gitlab-ci.yml

vibeguard:
  stage: test
  image: node:22
  script:
    - npm ci
    - npx -y vibeguard scan . --sarif > vibeguard-report.sarif
    - npx -y vibeguard scan . --fail-on high
  artifacts:
    reports:
      codequality: vibeguard-report.sarif
    paths:
      - vibeguard-report.sarif
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
