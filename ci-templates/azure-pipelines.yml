# VibeGuard Azure DevOps Pipeline template
# Generated by 'vibeguard init-ci --azure' — add this to azure-pipelines.yml

trigger:
  branches:
    include:
      - main
      - feature/*

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '22.x'
    displayName: 'Install Node.js'

  - script: |
      npm ci
      npx -y vibeguard scan . --sarif > $(Build.ArtifactStagingDirectory)/vibeguard-report.sarif || true
      npx -y vibeguard scan . --fail-on high
    displayName: 'VibeGuard Security Scan'

  - task: PublishBuildArtifacts@1
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)/vibeguard-report.sarif'
      ArtifactName: 'VibeGuardReport'
    condition: always()
